# Build VStar documentation and publish it to the gh-pages branch under
#   docs/vstar/snapshot/  -- from the snapshot release tag
#   docs/vstar/release/   -- from the latest semantic-version tag
#
# Publishes:
#   docs/vstar/{snapshot,release}/user_manual/VStarUserManual.pdf
#   docs/vstar/{snapshot,release}/plugin/*.pdf  (plugin docs + plugin dev guide)
#
# Triggers:
#   - Any GitHub release publish (snapshot release or stable X.Y.Z release)
#   - Manual dispatch (with optional choice of which set to refresh)
#
# See: https://github.com/AAVSO/VStar/issues/592

name: Docs

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Which doc set(s) to refresh'
        required: true
        default: 'both'
        type: choice
        options:
          - both
          - snapshot
          - release

permissions:
  contents: write

jobs:
  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    name: Publish documentation PDFs

    steps:
    - name: Decide which targets to build
      id: targets
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          T="${{ inputs.target }}"
        else
          T="both"
        fi
        case "$T" in
          snapshot) BUILD_SNAPSHOT=true; BUILD_RELEASE=false ;;
          release)  BUILD_SNAPSHOT=false; BUILD_RELEASE=true ;;
          both|*)   BUILD_SNAPSHOT=true; BUILD_RELEASE=true ;;
        esac
        echo "build_snapshot=$BUILD_SNAPSHOT" >> "$GITHUB_OUTPUT"
        echo "build_release=$BUILD_RELEASE" >> "$GITHUB_OUTPUT"
        echo "Targets: snapshot=$BUILD_SNAPSHOT release=$BUILD_RELEASE"

    - name: Resolve snapshot ref
      id: snapref
      if: steps.targets.outputs.build_snapshot == 'true'
      run: |
        if git ls-remote --tags https://github.com/${{ github.repository }}.git refs/tags/snapshot | grep -q .; then
          echo "ref=refs/tags/snapshot" >> "$GITHUB_OUTPUT"
        else
          echo "ref=refs/heads/master" >> "$GITHUB_OUTPUT"
        fi

    - name: Resolve latest stable release tag
      id: relref
      if: steps.targets.outputs.build_release == 'true'
      run: |
        TAG=$(git ls-remote --tags https://github.com/${{ github.repository }}.git \
          | awk '{print $2}' \
          | sed 's|refs/tags/||;s|\^{}||' \
          | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' \
          | sort -V \
          | tail -1)
        if [ -z "$TAG" ]; then
          echo "No semantic-version tag found; skipping release docs."
          echo "found=false" >> "$GITHUB_OUTPUT"
        else
          echo "Latest stable release tag: $TAG"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
        fi

    # ---------- Snapshot ----------
    - name: Checkout snapshot source
      if: steps.targets.outputs.build_snapshot == 'true'
      uses: actions/checkout@v4
      with:
        ref: ${{ steps.snapref.outputs.ref }}
        path: src_snapshot

    - name: Capture snapshot metadata
      if: steps.targets.outputs.build_snapshot == 'true'
      id: snapmeta
      working-directory: src_snapshot
      run: |
        SHA=$(git rev-parse HEAD)
        SHORT=$(git rev-parse --short=8 HEAD)
        CDATE=$(git log -1 --format=%cI HEAD | cut -dT -f1)
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        echo "short=$SHORT" >> "$GITHUB_OUTPUT"
        echo "cdate=$CDATE" >> "$GITHUB_OUTPUT"

    # ---------- Release ----------
    - name: Checkout release source
      if: steps.targets.outputs.build_release == 'true' && steps.relref.outputs.found == 'true'
      uses: actions/checkout@v4
      with:
        ref: refs/tags/${{ steps.relref.outputs.tag }}
        path: src_release

    - name: Capture release metadata
      if: steps.targets.outputs.build_release == 'true' && steps.relref.outputs.found == 'true'
      id: relmeta
      working-directory: src_release
      run: |
        SHA=$(git rev-parse HEAD)
        SHORT=$(git rev-parse --short=8 HEAD)
        CDATE=$(git log -1 --format=%cI HEAD | cut -dT -f1)
        echo "sha=$SHA" >> "$GITHUB_OUTPUT"
        echo "short=$SHORT" >> "$GITHUB_OUTPUT"
        echo "cdate=$CDATE" >> "$GITHUB_OUTPUT"

    # ---------- Publish to gh-pages ----------
    - name: Checkout gh-pages
      uses: actions/checkout@v4
      with:
        ref: gh-pages
        path: _site

    - name: Stage docs into gh-pages worktree
      run: |
        DATE=$(date -u +%Y-%m-%d)
        mkdir -p _site/docs/vstar _site/docs/data

        if [ "${{ steps.targets.outputs.build_snapshot }}" = "true" ]; then
          rm -rf _site/docs/vstar/snapshot
          mkdir -p _site/docs/vstar/snapshot/user_manual
          mkdir -p _site/docs/vstar/snapshot/plugin
          if [ -f src_snapshot/doc/user_manual/VStarUserManual.pdf ]; then
            cp src_snapshot/doc/user_manual/VStarUserManual.pdf \
               _site/docs/vstar/snapshot/user_manual/
          fi
          if ls src_snapshot/plugin/doc/*.pdf 1>/dev/null 2>&1; then
            cp src_snapshot/plugin/doc/*.pdf \
               _site/docs/vstar/snapshot/plugin/
          fi
        fi

        if [ "${{ steps.targets.outputs.build_release }}" = "true" ] && \
           [ "${{ steps.relref.outputs.found }}" = "true" ]; then
          rm -rf _site/docs/vstar/release
          mkdir -p _site/docs/vstar/release/user_manual
          mkdir -p _site/docs/vstar/release/plugin
          if [ -f src_release/doc/user_manual/VStarUserManual.pdf ]; then
            cp src_release/doc/user_manual/VStarUserManual.pdf \
               _site/docs/vstar/release/user_manual/
          fi
          if ls src_release/plugin/doc/*.pdf 1>/dev/null 2>&1; then
            cp src_release/plugin/doc/*.pdf \
               _site/docs/vstar/release/plugin/
          fi
        fi

        # Merge new metadata with existing data/docs.json so a snapshot-only or
        # release-only run doesn't clobber the other set.
        python3 - "$DATE" \
          "${{ steps.targets.outputs.build_snapshot }}" \
          "${{ steps.snapmeta.outputs.sha }}" \
          "${{ steps.snapmeta.outputs.short }}" \
          "${{ steps.snapmeta.outputs.cdate }}" \
          "${{ steps.targets.outputs.build_release }}" \
          "${{ steps.relref.outputs.found }}" \
          "${{ steps.relref.outputs.tag }}" \
          "${{ steps.relmeta.outputs.sha }}" \
          "${{ steps.relmeta.outputs.short }}" \
          "${{ steps.relmeta.outputs.cdate }}" <<'PY'
        import json, os, sys
        date, do_snap, s_sha, s_short, s_cdate, do_rel, rel_found, r_tag, r_sha, r_short, r_cdate = sys.argv[1:]
        path = "_site/docs/data/docs.json"
        try:
            with open(path) as f:
                data = json.load(f)
        except (OSError, ValueError):
            data = {}
        data["updated"] = date
        if do_snap == "true":
            data["snapshot"] = {
                "commit": s_sha, "commit_short": s_short,
                "commit_date": s_cdate, "generated": date,
                "path": "vstar/snapshot/",
            }
        if do_rel == "true" and rel_found == "true":
            data["release"] = {
                "tag": r_tag, "commit": r_sha, "commit_short": r_short,
                "commit_date": r_cdate, "generated": date,
                "path": "vstar/release/",
            }
        with open(path, "w") as f:
            json.dump(data, f, indent=2)
            f.write("\n")
        print(json.dumps(data, indent=2))
        PY

    - name: Generate per-set and plugin index pages
      run: |
        python3 - \
          "${{ steps.targets.outputs.build_snapshot }}" \
          "${{ steps.snapmeta.outputs.short }}" \
          "${{ steps.snapmeta.outputs.cdate }}" \
          "${{ steps.targets.outputs.build_release }}" \
          "${{ steps.relref.outputs.found }}" \
          "${{ steps.relref.outputs.tag }}" \
          "${{ steps.relmeta.outputs.short }}" \
          "${{ steps.relmeta.outputs.cdate }}" <<'PY'
        import sys, os, glob, html as he
        do_snap, s_short, s_cdate, do_rel, rel_found, r_tag, r_short, r_cdate = sys.argv[1:]

        CSS = """
          :root { --bg:#0d1117; --surface:#161b22; --border:#30363d;
                  --text:#e6edf3; --text-muted:#8b949e; --accent:#58a6ff;
                  --header-bg:linear-gradient(135deg,#0d1117 0%,#1a2332 50%,#0d1117 100%); }
          * { margin:0; padding:0; box-sizing:border-box; }
          body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
                 background:var(--bg); color:var(--text); line-height:1.6; }
          header { background:var(--header-bg); border-bottom:1px solid var(--border);
                   padding:2rem 1rem; text-align:center; }
          header h1 { font-size:1.5rem; font-weight:600; letter-spacing:-0.02em; }
          header p { color:var(--text-muted); font-size:0.9rem; margin-top:0.25rem; }
          header .home-link { display:inline-block; margin-top:0.75rem; font-size:0.85rem;
                              color:var(--accent); text-decoration:none; }
          header .home-link:hover { text-decoration:underline; }
          main { max-width:760px; margin:0 auto; padding:2rem 1rem; }
          .card { background:var(--surface); border:1px solid var(--border); border-radius:8px;
                  padding:1.25rem 1.5rem; margin-bottom:0.75rem; }
          .card h2 { font-size:1rem; font-weight:600; margin-bottom:0.2rem; }
          .card .meta { color:var(--text-muted); font-size:0.8rem; margin-bottom:0.75rem; }
          .links { display:flex; flex-wrap:wrap; gap:0.5rem; }
          .links a { display:inline-block; color:var(--accent); text-decoration:none;
                     font-size:0.85rem; border:1px solid var(--border); padding:0.35rem 0.75rem;
                     border-radius:6px; transition:border-color .15s,background .15s; }
          .links a:hover { border-color:var(--accent); background:rgba(88,166,255,0.1); }
          ul.plugin-list { list-style:none; padding:0; }
          ul.plugin-list li { margin-bottom:0.4rem; }
          ul.plugin-list a { color:var(--accent); text-decoration:none; font-size:0.9rem; }
          ul.plugin-list a:hover { text-decoration:underline; }
          .note { color:var(--text-muted); font-size:0.8rem; margin-top:1.5rem; text-align:center; }
          footer { text-align:center; padding:2rem 1rem; color:var(--text-muted);
                   font-size:0.8rem; border-top:1px solid var(--border); }
          footer a { color:var(--accent); text-decoration:none; }
          footer a:hover { text-decoration:underline; }
        """

        def set_index(label, meta):
            meta_html = f'<div class="meta">{he.escape(meta)}</div>' if meta else ''
            return f"""<!DOCTYPE html>
        <html lang="en">
        <head><meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VStar Documentation &mdash; {he.escape(label)}</title>
        <style>{CSS}</style></head>
        <body>
        <header>
          <h1>VStar Documentation &mdash; {he.escape(label)}</h1>
          {meta_html}
          <a class="home-link" href="../../">&larr; Back to Documentation</a>
        </header>
        <main>
          <div class="card">
            <h2>User Manual</h2>
            <div class="links"><a href="user_manual/VStarUserManual.pdf">Open PDF</a></div>
          </div>
          <div class="card">
            <h2>Plugin Development Guide</h2>
            <div class="links"><a href="plugin/vstar_plugin_dev.pdf">Open PDF</a></div>
          </div>
          <div class="card">
            <h2>Plugin Docs</h2>
            <div class="links"><a href="plugin/">Browse all plugin docs &rarr;</a></div>
          </div>
        </main>
        <footer><p><a href="https://github.com/AAVSO/VStar">AAVSO/VStar</a> &mdash;
        Published by the <code>docs</code> workflow.</p></footer>
        </body></html>"""

        def plugin_index(label, pdf_names):
            items = '\n'.join(
                f'    <li><a href="{he.escape(n)}">{he.escape(n)}</a></li>'
                for n in sorted(pdf_names)
            )
            return f"""<!DOCTYPE html>
        <html lang="en">
        <head><meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>VStar Plugin Docs &mdash; {he.escape(label)}</title>
        <style>{CSS}</style></head>
        <body>
        <header>
          <h1>VStar Plugin Docs &mdash; {he.escape(label)}</h1>
          <a class="home-link" href="../">&larr; Back to {he.escape(label)} docs</a>
        </header>
        <main>
          <div class="card">
            <h2>Plugin documents</h2>
            <ul class="plugin-list">
        {items}
            </ul>
          </div>
        </main>
        <footer><p><a href="https://github.com/AAVSO/VStar">AAVSO/VStar</a> &mdash;
        Published by the <code>docs</code> workflow.</p></footer>
        </body></html>"""

        sets = []
        if do_snap == 'true':
            meta = f'Commit {s_short} \u00b7 {s_cdate}' if s_short else ''
            sets.append(('snapshot', 'Snapshot', meta))
        if do_rel == 'true' and rel_found == 'true':
            meta = f'{r_tag} \u00b7 Commit {r_short} \u00b7 {r_cdate}' if r_short else ''
            sets.append(('release', 'Latest stable release', meta))

        for set_name, label, meta in sets:
            base = f'_site/docs/vstar/{set_name}'
            with open(f'{base}/index.html', 'w') as fh:
                fh.write(set_index(label, meta))
            pdf_names = [os.path.basename(p)
                         for p in glob.glob(f'{base}/plugin/*.pdf')]
            with open(f'{base}/plugin/index.html', 'w') as fh:
                fh.write(plugin_index(label, pdf_names))
        PY

    - name: Commit and push to gh-pages
      working-directory: _site
      run: |
        DATE=$(date -u +%Y-%m-%d)
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git config user.name "github-actions[bot]"
        git add -A
        if git diff --cached --quiet; then
          echo "No documentation changes to publish."
          exit 0
        fi
        SUMMARY="Update docs"
        if [ "${{ steps.targets.outputs.build_snapshot }}" = "true" ] && [ "${{ steps.targets.outputs.build_release }}" = "true" ]; then
          SUMMARY="Update docs (snapshot ${{ steps.snapmeta.outputs.short }} + release ${{ steps.relref.outputs.tag }})"
        elif [ "${{ steps.targets.outputs.build_snapshot }}" = "true" ]; then
          SUMMARY="Update snapshot docs (${{ steps.snapmeta.outputs.short }})"
        elif [ "${{ steps.targets.outputs.build_release }}" = "true" ]; then
          SUMMARY="Update release docs (${{ steps.relref.outputs.tag }})"
        fi
        git commit -m "${SUMMARY} [${DATE}]"
        for i in 1 2 3; do
          git pull --rebase origin gh-pages && git push origin gh-pages && break
          echo "Push attempt $i failed, retrying in $((i * 5))s..."
          sleep $((i * 5))
        done

    - name: Step summary
      if: always()
      run: |
        cat >> "$GITHUB_STEP_SUMMARY" <<EOF
        ## Documentation publication

        | Set | Built | Source |
        |-----|-------|--------|
        | snapshot | ${{ steps.targets.outputs.build_snapshot }} | ${{ steps.snapmeta.outputs.short }} (${{ steps.snapmeta.outputs.cdate }}) |
        | release  | ${{ steps.targets.outputs.build_release }} (${{ steps.relref.outputs.found }}) | ${{ steps.relref.outputs.tag }} @ ${{ steps.relmeta.outputs.short }} (${{ steps.relmeta.outputs.cdate }}) |

        Published to: https://aavso.github.io/VStar/docs/
        EOF
